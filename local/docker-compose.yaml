services:
  kafka:
    image: confluentinc/cp-kafka:7.9.0
    hostname: kafka
    user: root
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: c3RyaW16aS10ZXN0Cg==
    healthcheck:
      test: ["CMD-SHELL", "bash", "-c", "/usr/bin/kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  postgres:
    image: debezium/postgres:15
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orders_db
    # Enables logical replication.
    command: >
      postgres -c wal_level=logical
               -c max_wal_senders=10
               -c max_replication_slots=10
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ${INIT_SCRIPT-./init.sql}:/docker-entrypoint-initdb.d/init.sql

  debezium:
    image: debezium/connect:3.0.0.Final
    hostname: debezium
    depends_on:
      kafka:
        condition: service_healthy
      otel-collector-healthcheck:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      KAFKA_OPTS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: debezium-connect
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_PROPAGATORS: tracecontext,baggage
    healthcheck:
      # Using about endpoint instead of /connectors because it's lighter.
      test: ["CMD", "curl", "-fsS", "http://debezium:8083/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar

  debezium-configurer:
    image: curlimages/curl:8.15.0
    depends_on:
      postgres:
        condition: service_healthy
      debezium:
        condition: service_healthy
    restart: on-failure
    entrypoint: |
      sh -c '
        echo "Debezium is healthy, configuring connector..." &&
        curl -sS -w "%{http_code}" http://debezium:8083/connectors \
          -H "Content-Type: application/json" \
          -d @/init-connector.json -v
      '
    volumes:
      - ./init-connector.json:/init-connector.json

  schemaregistry:
    image: confluentinc/cp-schema-registry:7.9.0
    hostname: schemaregistry
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
      SCHEMA_REGISTRY_HOST_NAME: schemaregistry
      SCHEMA_REGISTRY_LISTENERS: http://schemaregistry:8081
      SCHEMA_REGISTRY_SCHEMA_REGISTRY_INTER_INSTANCE_PROTOCOL: "http"
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: INFO
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://schemaregistry:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

