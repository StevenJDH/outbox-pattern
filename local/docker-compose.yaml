  # The image (provectuslabs/kafka-ui) is now forked to https://github.com/kafbat/kafka-ui.
  # Reference: https://github.com/provectus/kafka-ui/issues/4502
  kafka-ui:
    image: kafbat/kafka-ui:latest
    hostname: kafbat-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      schemaregistry:
        condition: service_healthy
      debezium-configurer:
        condition: service_started
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      SERVER_PORT: 8080
      KAFKA_CLUSTERS_0_NAME: kafka-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schemaregistry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://debezium:8083

  zipkin:
    image: openzipkin/zipkin:3.5.1
    hostname: zipkin
    ports:
      # Using port 9412 on the host for UI to avoid port
      # conflict with host-switch.exe from Rancher Desktop
      # in case of already running Dapr setup.
      - "9412:9411"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://zipkin:9411/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
  
  # Used for OTLP → Collector → Zipkin to keep app OTLP-native.
  otel-collector:
    image: otel/opentelemetry-collector:0.132.2
    hostname: otel-collector
    ports:
      - "4317:4317" # OTLP/gRPC
      - "4318:4318" # OTLP/HTTP
    depends_on:
      zipkin:
        condition: service_healthy
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config", "/etc/otel-collector-config.yaml"]

  # Health check done here because otel-collector does not have curl, wget, nc, or similar tools. 
  otel-collector-healthcheck:
    image: curlimages/curl:8.15.0
    depends_on:
      - otel-collector
    command: ["tail", "-f", "/dev/null"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://otel-collector:13133/health"]
      interval: 10s
      timeout: 5s
      retries: 12

