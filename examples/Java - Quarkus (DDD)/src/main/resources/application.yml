quarkus:
  application:
    name: outbox-pattern
  banner:
    # Disabled for custom logo.
    enabled: false
  datasource:
    db-kind: postgresql
    username: postgres
    password: password
    jdbc:
      url: jdbc:postgresql://localhost:5432/orders_db
  http:
    port: 9080
  shutdown:
    # Define maximum time before forcing shutdown after Listening for shutdown
    # signals and lets beans close properly, including connection pools. (Default: 0S).
    timeout: 30S
  hibernate-orm:
    database:
      generation: validate
    physical-naming-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    log:
      sql: false
      bind-parameters: false
  jackson:
    write-dates-as-timestamps: false
  debezium-outbox:
    table-name: outbox_event
    id:
      name: id
    aggregate-type:
      name: aggregate_type
    aggregate-id:
      name: aggregate_id
      column-definition: io.github.stevenjdh.examples.outboxpattern.infrastructure.persistence.converter.UUIDConverter
    type:
      name: type
    payload:
       name: payload
    timestamp:
      name: timestamp
    tracing-span:
      name: tracing_span_context
    remove-after-insert: false
  management:
    enabled: true
    port: 9081
    root-path: /management
  smallrye-health:
    liveness-path: /management/health/liveness
    readiness-path: /management/health/readiness
  micrometer:
    enabled: true
    registry-enabled-default: true
    binder-enabled-default: true
    export:
      prometheus:
        enabled: true
        path: /management/prometheus

  live-reload:
    enabled: false
  devservices:
    enabled: false
  test:
    continuous-testing: disabled
