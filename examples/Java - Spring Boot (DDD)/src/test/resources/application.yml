# Test settings.
spring:
  application:
    name: outbox-pattern
  datasource:
    url: jdbc:h2:mem:orders_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: sa
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  output:
    ansi:
      enabled: always
  otlp:
    tracing:
      export:
        enabled: false
  tracing:
    enabled: false
  observations:
    enabled: false
logging:
  pattern:
    correlation: ""
