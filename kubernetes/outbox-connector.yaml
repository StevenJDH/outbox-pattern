apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  # No ACLs defined, so add user as super user in Kafka resource.
  name: connect-cluster
  labels:
    strimzi.io/cluster: my-strimzi-cluster
spec:
  authentication:
    type: tls
  authorization:
    type: simple
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: debezium-connect-cluster
  annotations:
    # use-connector-resources configures this KafkaConnect
    # to use KafkaConnector resources to avoid
    # needing to call the Connect REST API directly.
    strimzi.io/use-connector-resources: "true"
spec:
  image: debezium/connect:3.0.0.Final
  replicas: 1
  bootstrapServers: strimzi-cluster-kafka-bootstrap:9094
  tls:
    trustedCertificates:
      - secretName: strimzi-cluster-cluster-ca-cert
        pattern: "*.crt"
  authentication:
    type: tls
    certificateAndKey:
      secretName: connect-cluster
      certificate: user.crt
      key: user.key
  # Config reference: https://kafka.apache.org/documentation/#connectconfigs
  # Properties with the following prefixes cannot be set: ssl., sasl., security.,
  # listeners, plugin.path, rest., bootstrap.servers, consumer.interceptor.classes,
  # producer.interceptor.classes (with the exception of: ssl.endpoint.identification.algorithm,
  # ssl.cipher.suites, ssl.protocol, ssl.enabled.protocols).
  config:
    config.providers: secrets
    config.providers.secrets.class: io.strimzi.kafka.KubernetesSecretConfigProvider
    group.id: connect-cluster
    offset.storage.topic: connect-cluster-offsets
    config.storage.topic: connect-cluster-configs
    status.storage.topic: connect-cluster-status
    # -1 means it will use the default replication factor configured in the broker.
    config.storage.replication.factor: -1
    offset.storage.replication.factor: -1
    status.storage.replication.factor: -1
  # This section is not needed if using a prebuilt image with the plugins already included.
  # build:
  #   output:
  #     type: docker
  #     image: my-registry.io/my-org/my-connect-cluster:latest
      # # Command: kubectl create secret docker-registry my-registry-credentials --docker-server=https://index.docker.io/v1/ --docker-username=<your-name> --docker-password=<your-pword> --docker-email=<your-email>
      # pushSecret: my-registry-credentials
    # plugins:
    #   - name: debezium-connector-postgres
    #     artifacts:
    #       - type: tgz
    #         url: https://repo1.maven.org/maven2/io/debezium/debezium-connector-postgres/3.1.1.Final/debezium-connector-postgres-3.1.1.Final-plugin.tar.gz
            # sha512sum: <SHA-512_checksum_of_connector_1_artifact>
      # - name: debezium-connector-postgres
      #   artifacts:
      #     - type: maven
      #       group: io.debezium
      #       artifact: debezium-connector-postgres
      #       version: 3.1.1.Final
---
apiVersion: v1
kind: Secret
metadata:
  name: debezium-secret
type: Opaque
data:
  username: cmVwbF91c2Vy
  password: cGFzc3dvcmQ=
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: outbox-connector
  labels:
    strimzi.io/cluster: debezium-connect-cluster
spec:
  class: io.debezium.connector.postgresql.PostgresConnector
  tasksMax: 1
  autoRestart:
    enabled: true
    maxRestarts: 10
  # Config reference: https://kafka.apache.org/documentation/#sourceconnectconfigs
  config:
    database.hostname: postgres
    database.port: "5432"
    database.user: ${secrets:strimzi/debezium-secret:username}
    database.password: ${secrets:strimzi/debezium-secret:password}
    database.dbname: orders_db
    database.server.name: example
    publication.name: debezium_pub

    plugin.name: pgoutput
    slot.name: debezium_slot

    topic.prefix: debezium
    table.include.list: public.outbox_event

    transforms: outbox
    transforms.outbox.type: io.debezium.transforms.outbox.EventRouter

    transforms.outbox.table.field.event.id: id
    transforms.outbox.table.field.event.type: type
    transforms.outbox.table.field.event.aggregate.type: aggregate_type
    transforms.outbox.table.field.event.key: aggregate_id
    transforms.outbox.table.field.event.payload: payload
    transforms.outbox.tracing.span.context.field: tracing_span_context
    transforms.outbox.table.field.event.timestamp: timestamp

    transforms.outbox.route.by.field: aggregate_type
    transforms.outbox.route.topic.regex: (.*)
    transforms.outbox.route.topic.replacement: outbox.$1
    
    transforms.outbox.table.fields.additional.placement: "type:header,tracing_span_context:header:baggage"
    transforms.outbox.table.expand.json.payload: "true"

    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: "false"
    value.converter.schemas.enable: "false"
