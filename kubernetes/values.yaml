architecture: "replication"

auth:
  username: postgres
  password: password
  database: orders_db
  replicationUsername: repl_user
  replicationPassword: password

primary:
  extendedConfiguration: |
    wal_level = logical
    max_wal_senders = 10
    max_replication_slots = 10
    wal_sender_timeout = 0
  initdb:
    scripts:
      create-outbox.sql: |
        CREATE TABLE outbox_event (
          id UUID PRIMARY KEY,
          aggregate_type VARCHAR(255) NOT NULL,   -- e.g., "Order"
          aggregate_id VARCHAR(255) NOT NULL,     -- e.g., "12345"
          type VARCHAR(255) NOT NULL,             -- e.g., "OrderCreated"
          payload JSONB NOT NULL,                 -- Event data
          timestamp TIMESTAMP DEFAULT now()       -- Optional, for tracking
        );
      create-publication.sql: |
        CREATE PUBLICATION debezium_pub FOR TABLE outbox_event;
